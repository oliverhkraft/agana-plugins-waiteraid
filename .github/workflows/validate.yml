name: validate
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install agana-plugin runtime
        run: pip install "git+https://github.com/oliverhkraft/agana-plugin-runtime.git"
      - name: Validate manifest
        run: agana-plugin validate
      - name: Run golden tests
        run: agana-plugin test
